name: Prime Hunt Data Pipeline

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:

  relics:

    name: Update Relics
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v6

      - uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Execute Relics Pipeline
        run: ./gradlew relics

      - name: Prepare Workspace
        run: |
          mkdir -p workspace/data
          cp data/relics.json workspace/data/

      - name: Upload Workspace
        uses: actions/upload-artifact@v6
        with:
          name: relics
          path: workspace/

  prime_sets:

    name: Update Prime Sets
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v6

      - uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Execute Prime Sets Pipeline
        run: ./gradlew prime_sets

      - name: Prepare Workspace
        run: |
          mkdir -p workspace/data
          cp data/prime-sets.json workspace/data/

      - name: Upload Workspace
        uses: actions/upload-artifact@v6
        with:
          name: prime_sets
          path: workspace/

  prime_collections:

    name: Update Prime Collections
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v6

      - uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Execute Prime Collections Pipeline
        run: ./gradlew prime_collections

      - name: Prepare Workspace
        run: |
          mkdir -p workspace/data
          cp data/prime-collections.json workspace/data/

      - name: Upload Workspace
        uses: actions/upload-artifact@v6
        with:
          name: prime_collections
          path: workspace/

  manifest:

    name: Update Manifest

    needs:
      - relics
      - prime_sets
      - prime_collections

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v6

      - uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - uses: actions/download-artifact@v6
        with:
          name: relics
          path: artifacts/relics

      - uses: actions/download-artifact@v6
        with:
          name: prime_sets
          path: artifacts/prime_sets

      - uses: actions/download-artifact@v6
        with:
          name: prime_collections
          path: artifacts/prime_collections

      - name: Assemble Workspace
        run: |
          mkdir -p data

          cp artifacts/relics/data/* data/
          cp artifacts/prime_sets/data/* data/
          cp artifacts/prime_collections/data/* data/

      - name: Execute Manifest Pipeline
        run: ./gradlew manifest

      - name: Prepare Workspace
        run: |
          mkdir -p workspace/data
          cp data/manifest.json workspace/data/

      - name: Upload Workspace
        uses: actions/upload-artifact@v6
        with:
          name: manifest
          path: workspace/

  consistency:

    name: Validate Database

    needs:
      - manifest

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v6

      - uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - uses: actions/download-artifact@v6
        with:
          name: relics
          path: artifacts/relics

      - uses: actions/download-artifact@v6
        with:
          name: prime_sets
          path: artifacts/prime_sets

      - uses: actions/download-artifact@v6
        with:
          name: prime_collections
          path: artifacts/prime_collections

      - uses: actions/download-artifact@v6
        with:
          name: manifest
          path: artifacts/manifest

      - name: Assemble Workspace
        run: |
          mkdir -p data

          cp artifacts/relics/data/* data/
          cp artifacts/prime_sets/data/* data/
          cp artifacts/prime_collections/data/* data/
          cp artifacts/manifest/data/* data/

      - name: Execute Consistency Pipeline
        run: ./gradlew consistency

      - name: Prepare Workspace
        run: |
          mkdir -p workspace
          cp -r data workspace/

      - name: Upload Validated Database
        uses: actions/upload-artifact@v6
        with:
          name: validated_database
          path: workspace/

  commit:

    name: Publish Database

    needs:
      - consistency

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          name: validated_database
          path: .

      - name: Debug
        run: |
          echo "=== Repository status ==="
          git status

          echo ""
          echo "=== Workspace ==="
          find data -type f | sort

      - name: Commit Changes
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore(data): update generated database"
          git push