name: Setup Gradle Environment

description: Checkout repository and prepare Java/Gradle.

runs:
  using: composite

  steps:

    - uses: actions/checkout@v7

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 21
        cache: gradle

    - name: Make Gradle executable
      shell: bash
      run: chmod +x gradlew